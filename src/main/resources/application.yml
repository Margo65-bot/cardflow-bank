server:
  port: 8080

spring:
  application:
    name: cardflow

  jpa:
    hibernate.ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  sql.init.mode: always

  datasource:
    url: jdbc:postgresql://localhost:5432/cardflow
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  liquibase:
    change-log: classpath:db/migration/db.changelog-master.yaml
    enabled: true

jwt:
  secret: cardflowSecretKeyForJWT2026ShouldBeAtLeast256BitsLongForHS256
  expiration: 86400000  # 24 часа

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework:
      orm.jpa: INFO
      transaction: INFO
      transaction.interceptor: TRACE
      orm.jpa.JpaTransactionManager: DEBUG
    ru.testingtask.cardflow: DEBUG
    org.springframework.security: INFO